# Separate, heavy environment for exercising Mexicah's package extensions. Kept out
# of the lean test/Project.toml so the normal test suite stays fast and MATLAB-free.
# The Extensions CI job instantiates this and runs check.jl. These extensions are
# never loaded by the main CI, which is how a batch of load/runtime bugs went
# unnoticed (see ext/ fixes). This guards against regressions of that class.
