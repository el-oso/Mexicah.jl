name = "MexFixtures"
uuid = "d305a66b-f837-4b64-9424-b28d2b0c9f89"
version = "0.1.0"

# A loadable package of @mexfunction fixtures for the MATLAB end-to-end CI. It
# must be a real on-disk package so juliac (a separate process) can `import` it
# when compiling each MEX. Building activates this project, which provides both
# Mexicah and the fixture module.

[deps]
Mexicah       = "28b42ba6-5630-446f-bcf8-82236b20fd10"
SparseArrays  = "2f01184e-e22b-5df5-ae63-d93ebab69eaf"

[sources]
Mexicah = {path = "../../.."}
