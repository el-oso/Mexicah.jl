name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        description: "[DEPRECATED] No longer has any effect"
        default: "3"
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@304fc93e4623081443fee5b6317ac73b37923574 # v1.25.8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Reuses the Documenter deploy key so that a new tag triggers the
          # documentation build workflow (GITHUB_TOKEN cannot trigger other
          # workflows). Set up at: Settings → Secrets → DOCUMENTER_KEY.
          ssh: ${{ secrets.DOCUMENTER_KEY }}
