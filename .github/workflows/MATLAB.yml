name: MATLAB

# End-to-end: build Mexicah MEX fixtures with juliac, then load and call them in
# real MATLAB on Linux, Windows, and macOS. On public repos the matlab-actions
# auto-license base MATLAB (no Coder/Compiler needed — calling a pre-built MEX is
# base MATLAB), so this runs without a license token.
#
# GPU MEX is intentionally not exercised here: hosted runners have no NVIDIA GPU
# or CUDA, and the GPU build needs a real device for PTX extraction.

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: matlab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matlab-e2e:
    name: MATLAB e2e - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2

      # Install the JuliaC tool by repo URL into a dedicated environment. This
      # bypasses Pkg.Apps.add (experimental in 1.12 — it could not resolve JuliaC
      # against the runner registry) and the PkgServer snapshot entirely: the
      # package is cloned from GitHub, its deps resolve from the registry as
      # normal. juliac is then invoked as `julia --project=<env> -m JuliaC`.
      - name: Install juliac (from source)
        shell: bash
        run: |
          julia -e 'using Pkg; Pkg.activate(joinpath(homedir(), ".juliac-env")); Pkg.add(url="https://github.com/JuliaLang/JuliaC.jl.git")'

      - name: juliac shim (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/juliac" <<EOF
          #!/usr/bin/env bash
          exec julia --project="$HOME/.juliac-env" --startup-file=no -m JuliaC "\$@"
          EOF
          chmod +x "$HOME/.local/bin/juliac"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: juliac shim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "$env:USERPROFILE\.local\bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $proj = "$env:USERPROFILE\.juliac-env"
          "@echo off`r`njulia --project=$proj --startup-file=no -m JuliaC %*" | Set-Content -Path "$bin\juliac.cmd" -Encoding ascii
          Add-Content -Path $env:GITHUB_PATH -Value $bin

      - name: Instantiate Mexicah
        shell: bash
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Build MEX fixtures
        shell: bash
        # build_fixtures.jl activates the MexFixtures package itself.
        run: julia test/matlab/build_fixtures.jl

      # Install MATLAB BEFORE exporting the bundled-library path. Otherwise its
      # installer (mpm) inherits LD_/DYLD_LIBRARY_PATH pointing at our bundled
      # Julia libs and loads the wrong ones (mpm crashed with 255 on macOS).
      - uses: matlab-actions/setup-matlab@v3
        with:
          release: latest

      # Linux only. macOS deliberately gets NO DYLD_LIBRARY_PATH: the impl dylib
      # already finds bundled libjulia via its @loader_path/lib rpaths (see
      # _fix_impl_rpath), and exporting DYLD_LIBRARY_PATH=mex/lib poisons MATLAB's
      # OWN startup — it would load our bundled libjulia/LLVM/libc++ instead of
      # its own and crash before running anything (same failure mpm hit). SIP
      # strips DYLD_* from the signed MATLAB binary anyway, so it is useless here.
      - name: Put bundled libjulia on the loader path (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          MEX="${{ github.workspace }}/mex"
          echo "LD_LIBRARY_PATH=$MEX:$MEX/lib:$MEX/lib/julia" >> "$GITHUB_ENV"
          # MATLAB ships an older libstdc++ and forces it ahead of the system's;
          # libjulia/LLVM needs a newer GLIBCXX. Preload the system libstdc++ so
          # the newer one wins (documented MATLAB-MEX workaround).
          STDCXX=$(gcc -print-file-name=libstdc++.so.6)
          echo "LD_PRELOAD=$STDCXX" >> "$GITHUB_ENV"
      - name: Put bundled libjulia on the loader path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $mex = "${{ github.workspace }}\mex"
          Add-Content -Path $env:GITHUB_ENV -Value "PATH=$mex;$mex\bin;$mex\lib;$env:PATH"

      - name: Disable Windows Error Reporting (crashes fail fast, no UI hang)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $k = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting"
          New-Item -Path $k -Force | Out-Null
          Set-ItemProperty -Path $k -Name DontShowUI -Value 1 -Type DWord
          Set-ItemProperty -Path $k -Name Disabled -Value 1 -Type DWord

      # All fixtures share ONE juliac library (one Julia runtime), so they can be
      # called together in a single MATLAB session — the real test of the
      # shared-runtime redesign. 14 fixtures in one session (Float64/Float32, int
      # widths, Bool, Float32 matrix, 3-D array, complex vector/matrix, struct in &
      # out, multi-output), blocking. (sparse is tested separately — see below.)
      - name: MATLAB fixtures (one session, non-sparse)
        if: runner.os != 'macOS'
        timeout-minutes: 8
        uses: matlab-actions/run-command@v3
        with:
          command: |
            addpath('${{ github.workspace }}/mex');
            assert(add_doubles(3.0,4.0)==7.0);
            assert(isequal(matrix_scale([1 2;3 4],2.0),[2 4;6 8]));
            assert(int64_double(int64(21))==int64(42));
            assert(int32_double(int32(21))==int32(42));
            assert(bool_not(true)==false && bool_not(false)==true);
            v=[1+2i;3-1i]; assert(isequal(complex_conj(v),conj(v)));
            assert(float32_double(single(2.5))==single(5.0) && isa(float32_double(single(2.5)),'single'));
            assert(int16_double(int16(10))==int16(20));
            assert(isequal(mat_f32_scale(single([1 2;3 4]),single(2)),single([2 4;6 8])));
            A3=reshape(double(1:24),2,3,4); assert(isequal(cube_add1(A3),A3+1));
            M=[1+2i 3-1i; 1i 2]; assert(isequal(cmat_conj(M),conj(M)));
            s=make_stats([2.0;4.0;6.0]); assert(s.mean==4.0 && s.n==3);
            [lo,hi]=minmax_vec([3.0;1.0;2.0]); assert(lo==1.0 && hi==3.0);
            lo1=minmax_vec([3.0;1.0;2.0]); assert(lo1==1.0);
            assert(stats_total(struct('mean',4.0,'n',3))==12.0);
            L=[true false; false true]; assert(isequal(logical_not_arr(L),~L));
            sa=struct('mean',{2.0,3.0},'n',{1,2}); o=scale_stats(sa,10.0);
            assert(numel(o)==2 && o(1).mean==20.0 && o(2).mean==30.0 && o(1).n==1 && o(2).n==2);
            vf=single([1+2i;3-1i]); assert(isequal(cf32_conj(vf),conj(vf)) && isa(cf32_conj(vf),'single'));
            disp('17 fixtures OK in one MATLAB session');

      # macOS: same one-session test as Linux/Windows. The impl dylib carries
      # @loader_path/lib rpaths (see _fix_impl_rpath) so it finds bundled libjulia
      # without DYLD_LIBRARY_PATH (which SIP strips from signed MATLAB). Blocking.
      - name: MATLAB fixtures (one session, non-sparse) — macOS
        if: runner.os == 'macOS'
        timeout-minutes: 8
        uses: matlab-actions/run-command@v3
        with:
          startup-options: -logfile ${{ github.workspace }}/mlmac.log
          command: |
            addpath('${{ github.workspace }}/mex');
            assert(add_doubles(3.0,4.0)==7.0);
            assert(isequal(matrix_scale([1 2;3 4],2.0),[2 4;6 8]));
            assert(int64_double(int64(21))==int64(42));
            assert(int32_double(int32(21))==int32(42));
            assert(bool_not(true)==false && bool_not(false)==true);
            v=[1+2i;3-1i]; assert(isequal(complex_conj(v),conj(v)));
            assert(float32_double(single(2.5))==single(5.0) && isa(float32_double(single(2.5)),'single'));
            assert(int16_double(int16(10))==int16(20));
            assert(isequal(mat_f32_scale(single([1 2;3 4]),single(2)),single([2 4;6 8])));
            A3=reshape(double(1:24),2,3,4); assert(isequal(cube_add1(A3),A3+1));
            M=[1+2i 3-1i; 1i 2]; assert(isequal(cmat_conj(M),conj(M)));
            s=make_stats([2.0;4.0;6.0]); assert(s.mean==4.0 && s.n==3);
            [lo,hi]=minmax_vec([3.0;1.0;2.0]); assert(lo==1.0 && hi==3.0);
            lo1=minmax_vec([3.0;1.0;2.0]); assert(lo1==1.0);
            assert(stats_total(struct('mean',4.0,'n',3))==12.0);
            L=[true false; false true]; assert(isequal(logical_not_arr(L),~L));
            sa=struct('mean',{2.0,3.0},'n',{1,2}); o=scale_stats(sa,10.0);
            assert(numel(o)==2 && o(1).mean==20.0 && o(2).mean==30.0 && o(1).n==1 && o(2).n==2);
            vf=single([1+2i;3-1i]); assert(isequal(cf32_conj(vf),conj(vf)) && isa(cf32_conj(vf),'single'));
            disp('17 fixtures OK in one MATLAB session');
      - name: macOS crash diagnostics
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          MEX="${{ github.workspace }}/mex"
          IMPL="$MEX/mexicah_fixtures_impl.dylib"
          echo "=== dlopen probe (isolate load vs run) ==="
          cat > /tmp/dltest.c <<'EOF'
          #include <dlfcn.h>
          #include <stdio.h>
          int main(int argc, char **argv) {
              void *h = dlopen(argv[1], RTLD_NOW | RTLD_LOCAL);
              if (!h) { printf("dlopen FAIL: %s\n", dlerror()); return 2; }
              printf("dlopen OK: %p\n", h);
              void *s = dlsym(h, "mexFunction_add_doubles");
              printf("dlsym mexFunction_add_doubles: %p\n", s);
              return 0;
          }
          EOF
          cc /tmp/dltest.c -o /tmp/dltest && /tmp/dltest "$IMPL"; echo "dltest exit=$?"
          echo "=== mlmac.log ==="; cat "$MEX/../mlmac.log" 2>/dev/null || cat "${{ github.workspace }}/mlmac.log" 2>/dev/null || echo "(none)"
          echo "=== mex layout ==="; ls -la "$MEX"; echo "--- lib ---"; ls -la "$MEX/lib" 2>/dev/null | head
          echo "=== impl: linked libraries (otool -L) ==="; otool -L "$IMPL" 2>&1 | head -20
          echo "=== impl: rpaths (otool -l) ==="; otool -l "$IMPL" 2>&1 | grep -A2 LC_RPATH
          echo "=== impl: code signature ==="; codesign -dv "$IMPL" 2>&1 | head
          echo "=== gateway otool -L ==="; otool -L "$MEX/add_doubles.mexmaca64" 2>&1 | head
          echo "=== MATLAB crash dumps (matlab_crash_dump.*) ==="
          for f in "$HOME"/matlab_crash_dump.* /tmp/matlab_crash_dump.* "${{ github.workspace }}"/matlab_crash_dump.* /private/tmp/matlab_crash_dump.*; do
            [ -f "$f" ] && { echo "----- $f -----"; sed -n '1,120p' "$f"; }
          done 2>/dev/null
          echo "=== MATLAB crash reports ==="
          for f in ~/Library/Logs/DiagnosticReports/* /Library/Logs/DiagnosticReports/* /Users/runner/Library/Logs/DiagnosticReports/*; do
            [ -f "$f" ] && { echo "----- $f -----"; sed -n '1,60p' "$f"; }
          done 2>/dev/null
          echo "=== recent crashes via log show ==="
          log show --last 10m --predicate 'eventMessage CONTAINS "MATLAB" OR senderImagePath CONTAINS "mexicah"' 2>/dev/null | grep -iE "crash|signal|abort|fault|mexicah" | head -20
          echo "(end diagnostics)"

      # Sparse on every OS. The accessors target the _730 (64-bit large-array)
      # symbols where needed — bare mxGetIr is rejected as obsolete in a MEX — so
      # this is now blocking everywhere (macOS via the _mxsym resolver, Windows via
      # the explicit _730 suffix, Linux via bare names).
      - name: MATLAB sparse_fro
        timeout-minutes: 8
        uses: matlab-actions/run-command@v3
        with:
          command: addpath('${{ github.workspace }}/mex'); assert(abs(sparse_fro(sparse([1 0;0 2]))-sqrt(5))<1e-12); disp('sparse_fro OK')
