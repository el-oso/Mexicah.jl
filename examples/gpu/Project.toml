# Build environment for the GPU example (examples/cuda_vector_add.jl).
#
# CUDA and KernelAbstractions are *weak* dependencies of Mexicah (they trigger
# MexicahCUDAExt and are never compiled into a MEX). Building a GPU MEX needs them
# loadable, which a package's own project cannot do for its weakdeps — hence this
# dedicated environment, kept separate from the lean CPU-example project so CPU
# builds don't bundle ~800 MiB of CUDA artifacts.
#
#   julia --project=examples/gpu -e 'using Pkg; Pkg.instantiate()'   # once
#   julia --project=examples/gpu examples/cuda_vector_add.jl
[deps]
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
Mexicah = "28b42ba6-5630-446f-bcf8-82236b20fd10"
TypeContracts = "c7a3f1e2-84b5-4d69-9e0a-1f2b3c4d5e6f"

[sources]
Mexicah = {path = "../.."}
TypeContracts = {url = "https://github.com/el-oso/TypeContracts.jl", rev = "master"}
